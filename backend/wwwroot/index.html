<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northwind App - Key Vault Status</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 60px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 24px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      color: #2e7d32;
      font-weight: 600;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #4caf50;
    }
    .status.disconnected {
      color: #c62828;
    }
    .status.disconnected .dot {
      background-color: #f44336;
    }
    .reason {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #888;
      max-width: 360px;
    }
    .secret-value {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #555;
    }
    .secret-value span {
      font-family: monospace;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
      color: #2e7d32;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Azure Key Vault Status</h1>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="status-text">Checking...</span>
    </div>
    <p class="reason" id="reason"></p>
    <p class="secret-value" id="secret-value"></p>
  </div>
  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('status');
        const text = document.getElementById('status-text');
        const reason = document.getElementById('reason');
        if (data.connected) {
          text.textContent = 'Connected';
          if (data.secretValue) {
            document.getElementById('secret-value').innerHTML =
              'Secret <code>status-check</code> = <span>' + data.secretValue + '</span>';
          }
        } else {
          el.classList.add('disconnected');
          text.textContent = 'Disconnected';
          if (data.reason) reason.textContent = data.reason;
        }
      })
      .catch(() => {
        const el = document.getElementById('status');
        const text = document.getElementById('status-text');
        el.classList.add('disconnected');
        text.textContent = 'Disconnected';
      });
  </script>
</body>
</html>
